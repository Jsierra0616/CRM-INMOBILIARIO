<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>CMR Inmobiliario - Portal Público</title>

  <!-- Estilos globales del sistema -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Lógica del portal público (cargar listados, filtros, detalle) -->
  <script defer src="js/APP.JS"></script>
</head>

<body>

  <!-- =============================
       HERO (portada visual)
       ============================= -->
  <header class="hero">

    <!-- Imagen de fondo -->
    <img class="hero-bg" src="fondo-moderno-de-la-calle-tokio.jpg" alt="Fondo">

    <!-- Capa oscura + logo + texto -->
    <div class="hero-overlay">

      <!-- Logo de la empresa -->
      <img class="logo-overlay" src="LOGO H2.png" alt="Logo">

      <div class="hero-text">
        <h1>CMR Inmobiliario</h1>
        <p>Encuentra tu próximo hogar</p>
      </div>
    </div>

    <!-- Enlace al acceso interno del personal -->
    <nav class="topnav">
      <a href="login.html" class="tab-btn">Acceso del Personal</a>
    </nav>
  </header>

  <!-- =============================
       CONTENIDO PRINCIPAL
       ============================= -->
  <main class="container">

    <h2>Explorar inmuebles</h2>

    <!-- =============================
         FILTROS DE BÚSQUEDA
         ============================= -->
    <div class="card">

      <!-- Filtro por tipo de operación -->
      <label>Tipo de operación:</label>
      <select id="filterOperacion">
        <option value="todos">Todos</option>
        <option value="Compra">Compra</option>
        <option value="Arriendo">Arriendo</option>
        <option value="Venta de inmueble">Venta de Proyecto</option>
      </select>

      <!-- Filtro por zona -->
      <label>Barrio / Zona:</label>
      <input type="text" id="filterZona" placeholder="Ej: Cedritos">

      <!-- Filtro por precio -->
      <label>Precio máximo (COP):</label>
      <input type="number" id="filterPrecio" placeholder="Ej: 500000000">

      <!-- Botón que activa los filtros -->
      <button id="btnFiltrar" class="btn primary">Aplicar filtros</button>
    </div>

    <!-- =============================
         LISTADO PÚBLICO DE PROPIEDADES
         ============================= -->
    <div id="publicProps" class="cards"></div>

  </main>

  <!-- =============================
       PIE DE PÁGINA
       ============================= -->
  <footer class="footer">
    <small>CMR Inmobiliario H2</small>
  </footer>

</body>
</html>
